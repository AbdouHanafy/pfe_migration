apiVersion: apps/v1
kind: Deployment
metadata:
  name: migration-api
  namespace: migration-pfe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: migration-api
  template:
    metadata:
      labels:
        app: migration-api
    spec:
      containers:
        - name: api
          image: image-registry.openshift-image-registry.svc:5000/migration-pfe/migration-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
